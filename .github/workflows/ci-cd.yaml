name: CI-CD Pipeline

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: cozyruiz/intranet-nextjs

jobs:

  # =========================
  # CI - Build & Push Image
  # =========================
  build:
    runs-on: self-hosted

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.meta.outputs.tag }} .

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:${{ steps.meta.outputs.tag }}

  # =========================
  # CD - Deploy to DEV
  # =========================
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: build
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Helm (DEV)
        run: |
          helm upgrade --install intranet-nextjs-dev ./helm/intranet-nextjs \
            -f helm/intranet-nextjs/values-dev.yaml \
            --set image.tag=${{ needs.build.outputs.image_tag }}

  # =========================
  # CD - Deploy to PROD
  # =========================
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: self-hosted
    environment: production   # 🔥 aquí vive el approval gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Helm (PROD)
        run: |
          helm upgrade --install intranet-nextjs-prod ./helm/intranet-nextjs \
            -f helm/intranet-nextjs/values-prod.yaml \
            --set image.tag=${{ needs.build.outputs.image_tag }}