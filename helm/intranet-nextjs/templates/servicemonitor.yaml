apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /api/metrics
      interval: 10s