replicaCount: 1

image:
  repository: cozyruiz/intranet-nextjs
  tag: "latest"
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: nextjs.local
      paths:
        - path: /
          pathType: Prefix

env:
  NODE_ENV: development
  ENVIRONMENT: "DEV"
  NEXT_PUBLIC_ENVIRONMENT: "DEV"